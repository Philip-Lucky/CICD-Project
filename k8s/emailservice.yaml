apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: emailservice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: emailservice
  template:
    metadata:
      labels:
        app: emailservice
    spec:
      containers:
      - name: server
        image: IMAGE_PLACEHOLDER
        ports:
        - containerPort: 8080
        env:
        - name: PORT
          value: "8080"
  strategy:
    blueGreen: 
      activeService: emailservice-active
      previewService: emailservice-preview
      autoPromotionEnabled: false
---
apiVersion: v1
kind: Service
metadata:
  name: emailservice-active
spec:
  type: NodePort
  selector:
    app: emailservice
  ports:
  - name: grpc
    port: 8080
    targetPort: 8080
    nodePort: 30080
---
apiVersion: v1
kind: Service
metadata:
  name: emailservice-preview
spec:
  type: NodePort
  selector:
    app: emailservice
  ports:
  - name: grpc
    port: 8080
    targetPort: 8080
    nodePort: 30081
